<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Aluno</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/cadastrarCurso.css">
</head>

<body>
  <div class="layout">
    <div class="menu-lateral">
      <div class="logo-box">
        <a href="dashboard.html">
          <img src="../assets/Logo.png" alt="Logo AcadTime" class="Logo">
        </a>
      </div>

      <aside class="sidebar">
        <ul>
          <li>Dashboard</li>
          <li><a href="cursos.html">Cursos</a></li>
          <li><a href="coordenadores.html">Coordenadores</a></li>
          <li><a href="alunos.html">Alunos</a></li>
          <li><a href="horasComplementares.html">Horas Complementares</a></li>
          <li><a href="listarCertificados.html">Análise de Certificados</a></li>
        </ul>
      </aside>
    </div>

    <main class="content">
      <h1>Cadastro/Edição de Aluno(a)</h1>
      <p>Preencha os dados do aluno(a)</p>

      <div class="card-form">
        <div class="campo">
          <label for="nome">Nome</label>
          <input type="text" id="nome">
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="email">Email</label>
            <input type="text" id="email">
          </div>

          <div class="campo">
            <label for="matricula">Matrícula</label>
            <input type="text" id="matricula">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha">
          </div>

          <div class="campo">
            <label for="curso">Curso Vinculado</label>
            <select id="curso">
                <option value="">Selecione um curso</option>
            </select>
          </div>
        </div>

        <div class="campo">
          <label>Status</label>
          <div class="radio-group">
            <input type="radio" id="ativo" name="status" value="ATIVO">
            <label for="ativo">Ativo</label>

            <input type="radio" id="trancado" name="status" value="TRANCADO">
            <label for="trancado">Trancado</label>

            <input type="radio" id="cancelado" name="status" value="CANCELADO">
            <label for="cancelado">Cancelado</label>

            <input type="radio" id="concluido" name="status" value="CONCLUIDO">
            <label for="concluido">Concluído</label>
          </div>
        </div>

        <div class="acoes-form">
          <button class="btn-cancelar" type="button" onclick="window.location.href='alunos.html'">Cancelar</button>
          <button class="btn-salvar" type="button" onclick="salvarAluno()">Salvar</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cadastrarAluno.js"></script>
</body>
</html>
