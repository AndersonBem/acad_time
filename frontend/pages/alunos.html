<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cursos</title>
    <meta name="description" content="Sistema AcadTime para gerenciamento de atividades complementares, submissões e auditorias de cursos.">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/cursos.css">

</head>

<body>
    <div class="layout">
        <div id="sidebar-container"></div>

        <main class="content">
        <section class="page-header">
        <button class="menu-menu" onclick="toggleMenu()">☰</button>

        <div class="page-title">
            <h1>Listagem de Alunos</h1>
            <p>Gerencie os alunos cadastrados aqui</p>
        </div>
        </section>

            <div class="card">
                <div class="topo-cursos">
                    <input type="text" id="buscar" placeholder="Buscar">

                    <select id="filtro-status">
                        <option value="">Filtrar por status</option>
                        <option value="ATIVO">Ativo</option>
                        <option value="TRANCADO">Trancado</option>
                        <option value="CANCELADO">Cancelado</option>
                        <option value="CONCLUIDO">Concluído</option>
                    </select>

                    <button class="button1" onclick="window.location.href='cadastrarAluno.html'">
                        + Cadastrar Novo Aluno
                    </button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nome do Aluno</th>
                            <th>Matrícula</th>
                            <th>Total de Horas</th>
                            <th>Status</th>
                            <th>Curso vinculado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="lista-alunos">

                    </tbody>
                </table>
            </div>

        </main>

        <script src="../js/config.js"></script>
        <script src="../js/utils.js"></script>
        <script src="../js/sidebar.js"></script>
        <script src="../js/alunos.js"></script>


</body>

</html>
