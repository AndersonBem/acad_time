<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>

    <link rel="stylesheet" href="../css/global.css">    
    <link rel="stylesheet" href="../css/cursos.css"> 

</head>

<body>
  <div class="layout">
    <div class="menu-lateral">
        <div class ="logo-box">
          <a href = "dashboard.html"><img src = "../assets/Logo.png" alt="Logo AcadTime" class="Logo"></a>       
    </div>



    <aside class="sidebar">
      <ul>
        <li>Dashboard</li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="coordenadores.html">Coordenadores</a></li>

</div>

    <main class="content">
      <h1>Listagem de Alunos</h1>
      <p>Gerencie os alunos cadastrados aqui</p>

      <div class="card">
        <div class="topo-cursos">
          <input type="text" id="buscar" placeholder="Buscar">

          <select>
            <option value="">Filtrar por status</option>
            <option value="ativo">Ativos</option>
            <option value="inativo">Inativos</option>
          </select>

          <button onclick="window.location.href='cadastrarAluno.html'">
            + Cadastrar Novo Aluno
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome do Aluno</th>
              <th>Status</th>
              <th>Curso vinculado</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="lista-alunos">
               
            </tbody>
        </table>
    </div>

    </main>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/alunos.js"></script>
