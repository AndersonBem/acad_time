<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Cursos</title>

    <link rel="stylesheet" href="../css/global.css">    
     <link rel="stylesheet" href="../css/cadastrarCurso.css">

</head>

<body>
  <div class="layout">
    <div class="menu-lateral">
        <div class ="logo-box">
            <a href = "dashboard.html"><img src = "../assets/Logo.png" alt="Logo AcadTime" class="Logo"></a>  
    </div>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>
    
    <aside class="sidebar">
      <ul>
        <li>Dashboard</li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="coordenadores.html">Coordenadores</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="horasComplementares.html">Horas Complementares</a></li>
      </ul>
    </aside>
</div>

<main class = "content">
    <h1>Cadastro/Edição de Coordenador(a)</h1>
    <p>Preencha os dados do coordenador(a)</p>

    <div class="card-form">
    
            <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome">
            </div>

            <div class="linha-dupla">
                <div class="campo">
                    <label for="email">Email</label>
                    <input type="text" id="email">
                </div>

                <div class="campo">
                    <label>Status</label>
                    <div class="radio-group">
                        <input type="radio" id="ativo" name="status" value="ativo">
                        <label for="ativo">Ativo</label>

                        <input type="radio" id="inativo" name="status" value="inativo">
                        <label for="inativo">Inativo</label>
                    </div>
                </div>
            </div>

            <div class="campo">
                <label>Curso Vinculado</label>
                <input type="text" id="curso">
            </div>

            <div class = "acoes-form">
                <button class="btn-cancelar" onclick="window.location.href='coordenadores.html'">Cancelar</button>
                <button class="btn-salvar" type="submit">Salvar</button>
            </div>
    </div>
</main>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/cadastrarCurso.js"></script>
    <script>
      function toggleMenu() {
        const sidebar = document.querySelector('.sidebar');
        sidebar.classList.toggle('open');}
    </script>
</body>
</html>
