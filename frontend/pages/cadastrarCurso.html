<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Cursos</title>

    <link rel="stylesheet" href="../css/global.css">  
    <link rel="stylesheet" href="../css/cadastrarCurso.css">

</head>

<body class="pagina-cadastro-curso">
  <div class="layout">
    <div class="menu-lateral">
        <div class ="logo-box">
            <a href = "dashboard.html"><img src = "../assets/Logo.png" alt="Logo AcadTime" class="Logo"></a>  
    </div>



    <aside class="sidebar">
      <ul>
         <li>Dashboard</li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="coordenadores.html">Coordenadores</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="horasComplementares.html">Horas Complementares</a></li>
        <li><a href="listarCertificados.html">Análise de Certificados</a></li>
      </ul>
    </aside>
</div>

    <main class="container">
      <h1 id="titulo-pagina">Cadastro/Edição de Curso</h1>
      <p>Preencha os campos para criar ou editar um curso</p>

      <div class="card-form">
        <h3>Cadastro/Edição de curso</h3>

        <form id="form-curso">
          <div class="campo">
            <label for="nome">Nome do Curso</label>
            <input type="text" id="nome" name="nome">
          </div>

          <div class="linha-dupla">
            <div class="campo">
              <label for="codigo">Código/Identificação</label>
              <input type="text" id="codigo" name="codigo">
            </div>

            <div class="campo">
              <label>Status</label>
              <div class="radio-group">
                <input type="radio" id="ativo" name="status" value="ativo">
                <label for="ativo">Ativo</label>

                <input type="radio" id="inativo" name="status" value="inativo">
                <label for="inativo">Inativo</label>
              </div>
            </div>
          </div>

          <div class="linha-dupla">
            <div class="campo campo-carga">
              <label for="cargaHoraria">Carga horária total exigida</label>
              <div class="input-com-texto">
                <input type="text" id="cargaHoraria" name="cargaHoraria">
                <span>Horas</span>
              </div>
            </div>

            <div class="campo">
              <label for="coordenador">Coordenador</label>
              <input type="text" id="coordenador" name="coordenador">
            </div>
          </div>

          <div class="campo">
            <label for="descricao">Descrição (Opcional)</label>
            <textarea id="descricao" name="descricao" rows="5"></textarea>
          </div>

          <div class="acoes-form">
            <button type="button" class="btn-cancelar" onclick="window.location.href='cursos.html'">
              Cancelar
            </button>
            <button type="submit" class="btn-salvar">Salvar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cadastrarCurso.js"></script>

  
  <script>
      function toggleMenu() {
        const sidebar = document.querySelector('.sidebar');
        sidebar.classList.toggle('open');}
    </script>

</body>
</html>
