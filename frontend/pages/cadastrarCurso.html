<!DOCTYPE html>
<html lang='pt-br'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cursos</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/cadastrarCurso.css">
</head>

<body class="pagina-cadastro-curso">
  <div class="layout">
    <div id="sidebar-container"></div>   

    <main class="container">
    <section class="page-header">
      <button class="menu-menu" onclick="toggleMenu()">☰</button>

      <div class="page-title">
        <h1>Cadastro/Edição de Curso</h1>
        <p>Preencha os campos para criar ou editar um curso</p>
      </div>
    </section>

      <div class="card-form">
        <h3>Cadastro/Edição de curso</h3>

        <form id="form-curso">
          <div class="campo">
            <label for="nome">Nome do Curso</label>
            <input type="text" id="nome" name="nome">
          </div>

          <div class="linha-dupla">
            <div class="campo">
              <label for="codigo">Código/Identificação</label>
              <input type="text" id="codigo" name="codigo">
            </div>

            <div class="campo">
              <label>Status</label>
              <div class="radio-group">
                <input type="radio" id="ativo" name="status" value="ativo">
                <label for="ativo">Ativo</label>

                <input type="radio" id="inativo" name="status" value="inativo">
                <label for="inativo">Inativo</label>
              </div>
            </div>
          </div>

          <div class="linha-dupla">
            <label for="cargaHoraria">Carga horária total exigida</label>
            <div class="input-com-texto carga-curta">
              <input type="text" id="cargaHoraria" name="cargaHoraria">
              <span>Horas</span>
            </div>
          </div>

          <div class="campo">
            <label for="descricao">Descrição (Opcional)</label>
            <textarea id="descricao" name="descricao" rows="5"></textarea>
          </div>

          <div class="acoes-form">

            <button type="submit" class="btn-salvar">Salvar</button>
          </div>
        </form>
      </div>
    </main>
  </div>
 
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/cadastrarCurso.js"></script>


</body>

</html>
