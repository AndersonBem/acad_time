<!DOCTYPE html>
<html lang='pt-br'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Cursos</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/cadastrarCurso.css">
</head>

<body class="pagina-cadastro-curso">
  <div class="layout">
    <div class="menu-lateral">
      <div class="logo-box">
        <a href="dashboard.html">
          <img src="../assets/Logo.png" alt="Logo AcadTime" class="logo">
        </a>
      </div>

      <aside class="sidebar">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <ul>
          <li>
            <a href="dashboard.html">
              <img src="../assets/img/Graph.png" class="menu-icon">
              <span>Dashboard</span>
            </a>
          </li>

          <li>
            <a href="cursos.html">
              <img src="../assets/img/Graduation Cap (1).png" class="menu-icon">
              <span>Cursos</span>
            </a>
          </li>

          <li>
            <a href="coordenadores.html">
              <img src="../assets/img/People.png" class="menu-icon">
              <span>Coordenadores</span>
            </a>
          </li>

          <li>
            <a href="alunos.html">
              <img src="../assets/img/People.png" class="menu-icon">
              <span>Alunos</span>
            </a>
          </li>

          <li>
            <a href="horasComplementares.html">
              <img src="../assets/img/Rollback.png" class="menu-icon">
              <span>Horas Complementares</span>
            </a>
          </li>

          <li>
            <a href="listarCertificados.html">
              <img src="../assets/img/Diploma.png" class="menu-icon">
              <span>Análise de Certificados</span>
            </a>
          </li>
        </ul>
        </ul>

        <button class="btn-logout" onclick="logout()">
          <img src="../assets/img/logout.png" alt="" class="logout-icon">
          <span>Sair</span>
        </button>
      </aside>
    </div>

    <main class="container">
       <button class="menu-menu" onclick="toggleMenu()">☰</button>
      <h1 id="titulo-pagina">Cadastro/Edição de Curso</h1>
      <p>Preencha os campos para criar ou editar um curso</p>

      <div class="card-form">
        <h3>Cadastro/Edição de curso</h3>

        <form id="form-curso">
          <div class="campo">
            <label for="nome">Nome do Curso</label>
            <input type="text" id="nome" name="nome">
          </div>

          <div class="linha-dupla">
            <div class="campo">
              <label for="codigo">Código/Identificação</label>
              <input type="text" id="codigo" name="codigo">
            </div>

            <div class="campo">
              <label>Status</label>
              <div class="radio-group">
                <input type="radio" id="ativo" name="status" value="ativo">
                <label for="ativo">Ativo</label>

                <input type="radio" id="inativo" name="status" value="inativo">
                <label for="inativo">Inativo</label>
              </div>
            </div>
          </div>

          <div class="linha-dupla">
            <label for="cargaHoraria">Carga horária total exigida</label>
            <div class="input-com-texto carga-curta">
              <input type="text" id="cargaHoraria" name="cargaHoraria">
              <span>Horas</span>
            </div>
          </div>

          <div class="campo">
            <label for="descricao">Descrição (Opcional)</label>
            <textarea id="descricao" name="descricao" rows="5"></textarea>
          </div>

          <div class="acoes-form">

            <button type="submit" class="btn-salvar">Salvar</button>
          </div>
        </form>
      </div>
    </main>
  </div>
  <button class="btn-abrir" id="btnAbrirMenu">☰ </button>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cadastrarCurso.js"></script>

  <script>
    function toggleMenu() {
      const sidebar = document.querySelector('.sidebar');
      sidebar.classList.toggle('open');
    }
  </script>
</body>

</html>
