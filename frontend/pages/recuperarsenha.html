<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha </title>
    <link rel="stylesheet" href="../css/recuperarsenha.css">
</head>

<body>

    <section class="login-container">


        
        <div class="form-side">
            <div class="login-box">
                <h2>Recuperar Senha</h2>

                <form id="recuperarForm">
                    <div class="input-group"> 
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <button type="submit" class="btn-redefinir">
                    <img src="../assets/img/Email Send.png" alt="" class="btn-icon">
                      Enviar link de Redefinição 
                    </button>
                    
                   
                    <button type="button" class="btn-login">
                       <span class="arrow-left">⮕</span> Voltar para login
                    </button>
                </form>    
            </div>
        </div>

    </section>
    <img src="../assets/img/logo.png" alt="Logo AcadTime" class="logo"> 

    <script src="../js/recuperarsenha.js"></script>
    <script src="../js/config.js"></script>
</body>
</html>
