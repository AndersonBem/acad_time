<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha </title>
    <meta name="description" content="Sistema AcadTime para gerenciamento de atividades complementares, submissões e auditorias de cursos.">
    <link rel="stylesheet" href="../css/recuperarsenha.css">
</head>

<body>

<section class="login-page">

    <div class="login-brand">
        <img src="../assets/img/logo.png" alt="Logo AcadTime" class="logo">
        <h1>Recuperar acesso</h1>
        <p>Informe seu e-mail para receber o link de redefinição de senha.</p>
    </div>

    <div class="login-card">
        <div class="login-box">
            <h2>Recuperar Senha</h2>
            <p class="login-subtitle">Enviaremos um link para seu e-mail</p>

            <form id="recuperarForm">

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required>
                </div>

                <button type="submit" class="btn-primary">
                    Enviar link de redefinição
                </button>

                <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">
                    ← Voltar para login
                </button>

            </form>
        </div>
    </div>

</section>

<script src="../js/recuperarsenha.js"></script>
<script src="../js/config.js"></script>

</body>
</html>
