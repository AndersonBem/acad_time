<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Cursos</title>

    <link rel="stylesheet" href="../css/global.css">    
    <link rel="stylesheet" href="../css/cursos.css"> 

</head>

<body>
  <div class="layout">
    <div class="menu-lateral">
        <div class ="logo-box">
            <a href = "dashboard.html"><img src = "../assets/Logo.png" alt="Logo AcadTime" class="Logo"></a>  
    </div>

<aside class="sidebar">
      <ul>
        <li>Dashboard</li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="coordenadores.html">Coordenadores</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="horasComplementares.html">Horas Complementares</a></li>
        <li><a href="listarCertificados.html">Análise de Certificados</a></li>
      </ul>
    </aside>

    
</div>

    <main class="content">
      <h1>Listagem de Cursos</h1>
      <p>Gerencie os cursos cadastrados aqui</p>

      <div class="card">
        <div class="topo-cursos">
          <input type="text" id="buscar" placeholder="Buscar">

          <select id="filtro-status">
            <option value="">Filtrar por status</option>
            <option value="ativo">Ativos</option>
            <option value="inativo">Inativos</option>
          </select>

          <button onclick="window.location.href='cadastrarCurso.html'">
            + Cadastrar Novo Curso
          </button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nome do Curso</th>
              <th>Status</th>
              <th>Código do Curso</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="lista-cursos">
            
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/cursos.js"></script>


</body>
