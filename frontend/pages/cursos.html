                </ul>

             <button class="menu-menu" onclick="toggleMenu()">☰</button>
            <h1>Listagem de Cursos</h1>
            <p>Gerencie os cursos cadastrados aqui</p>

            <div class="card">

                <div class="topo-cursos">
                    <input type="text" id="buscar" placeholder="Buscar">

                    <select id="filtro-status">
                        <option value="">Filtrar por status</option>
                        <option value="ativo">Ativos</option>
                        <option value="inativo">Inativos</option>
                    </select>

                    <button class="button1" onclick="window.location.href='cadastrarCurso.html'">

                    </button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nome do Curso</th>
                            <th>Status</th>
                            <th>Código do Curso</th>
                            <th>Ações</th>
                        </tr>

                    </tbody>
