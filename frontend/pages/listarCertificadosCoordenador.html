<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Cursos</title>

    <link rel="stylesheet" href="../css/global.css">    
    <link rel="stylesheet" href="../css/cadastrarCurso.css"> 
    <link rel="stylesheet" href="../css/listarCertificados.css"> 

</head>

<body>
  <div class="layout">
    <div class="menu-lateral">
        <div class ="logo-box">
            <a href = "dashboard.html"><img src = "../assets/Logo.png" alt="Logo AcadTime" class="Logo"></a>  
    </div>


    <aside class="sidebar">
      <ul>
         <li>Dashboard</li>
        <li><a href="cursos.html">Cursos</a></li>
        <li><a href="coordenadores.html">Coordenadores</a></li>
        <li><a href="alunos.html">Alunos</a></li>
        <li><a href="horasComplementares.html">Horas Complementares</a></li>
        <li><a href="listarCertificados.html">Análise de Certificados</a></li>
      </ul>
    </aside>
</div>

    <main class="content">

      <div class="card card-analise-lista">

        <div class="cabecalho-pagina">
          <h1>Análise de Certificados</h1>
          <p>Solicitações do seu curso</p>
        </div>

        <div class="card curso-vinculado-card">
          <strong>Curso:</strong>
          <span>Analise e Desenvolvimento de Sistemas</span>
        </div>

        <div class="card filtros-card filtros-coordenador">

          <div class="filtro">
            <label>Buscar aluno</label>
            <input type="text">
          </div>

          <div class="filtro">
            <label>Status</label>
            <select>
              <option>Todos</option>
              <option>Em análise</option>
              <option>Aprovado</option>
            </select>
          </div>

          <div class="filtro">
            <label>Categoria</label>
            <select>
              <option>Todas</option>
              <option>Extensão</option>
            </select>
          </div>

        </div>

        <div class="card tabela-card">

          <table class="tabela-analise">
            <thead>
              <tr>
                <th>Aluno</th>
                <th>Categoria</th>
                <th>Carga</th>
                <th>Data</th>
                <th>Status</th>
                <th>Ação</th>
              </tr>
            </thead>

            <tbody>

              <tr>
                <td data-label="Aluno">
                  Careca bem
                </td>

                <td data-label="Categoria">
                  Ensino
                </td>

                <td data-label="Carga">
                  20h
                </td>

                <td data-label="Data">
                  12/12/2025
                </td>

                <td data-label="Status">
                  <span class="status-badge em-analise">Em análise</span>
                </td>

                <td data-label="Ação">
                  <a href="analiseCertificados.html?id=1" class="btn-acao analisar">
                    Analisar
                  </a>
                </td>
              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </main>
  </div>
</body>
</html>
