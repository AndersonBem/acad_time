
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dashboard - AcadTime</title>

    <link rel="stylesheet" href="../css/global.css">    
    <link rel="stylesheet" href="../css/dashboard.css"> 
</head>

<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <button class="menu-toggle" id="menuToggle">✕</button>
            <div class="logo-box">
                
                <a href="dashboard.html">
                   
                </a>  
            </div>
              <ul>
    <li>
        <a href="dashboard.html">
            <img src="../assets/img/Performance Macbook.png" alt="Dashboard" class="menu-icon">
            <span>Dashboard</span>
        </a>
    </li>
    <li>
        <a href="cursos.html">
            <img src="../assets/img/Graduation Cap (1).png" alt="Cursos" class="menu-icon">
            <span>Cursos</span>
        </a>
    </li>
    <li>
        <a href="coordenadores.html">
            <img src="../assets/img/People.png" alt="Coordenadores" class="menu-icon">
            <span>Coordenadores</span>
        </a>
    </li>
    <li>
        <a href="alunos.html">
            <img src="../assets/img/People.png" alt="Alunos" class="menu-icon">
            <span>Alunos</span>
        </a>
    </li>
    <li>
        <a href="horasComplementares.html">
            <img src="../assets/img/Rollback.png" alt="Horas Complementares" class="menu-icon">
            <span>Horas Complementares</span>
        </a>
    </li>
    <li>
        <a href="listarCertificados.html">
            <img src="../assets/img/Diploma.png" alt="Análise de Certificados" class="menu-icon">
            <span>Análise de Certificados</span>
        </a>
    </li>
</ul>
<button class="btn-logout" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> 
        <span>Sair</span>
    </button>


        </aside>
          
        <main class="content">
            <header class="header">
                <h1 class="h1">Dashboard</h1>
                <p class="p1">Bem-vindo(a), Super Admin</p>
            </header>
              
            <!-- Cards principais -->
            <div class="container">
                <div class="box">
                    <img src="../assets/img/Graduation Cap.png" alt="Cursos" class="btn-icon">
                    <span id="numCursos" class="numero">0</span>
                    <h5 class="h5">Cursos</h5>
                </div>
                <div class="box">
                    <img src="../assets/img/People.png" alt="Coordenadores" class="btn-icon">
                    <span id="numCoordenadores" class="numero">0</span>
                    <h5 class="h5">Coordenadores</h5>
                </div>
                <div class="box">
                    <img src="../assets/img/Student Male.png" alt="Alunos" class="btn-icon">
                    <span id="numAlunos" class="numero">0</span>
                    <h5 class="h5">Alunos Cadastrados</h5>
                </div>
                <div class="box">
                    <img src="../assets/img/Task Planning.png" alt="Solicitações" class="btn-icon">
                    <span id="numSolicitacoes" class="numero">0</span>
                    <h5 class="h5">Solicitações</h5>
                </div>
            </div>

            <!-- Cards de Aprovados, Pendentes, Reprovados -->
            <div class="container1">
                <div class="box1">
                    <div class="div2 aprovados">
                        <span id="numAprovados" class="numero1">0</span>
                        <span class="label">Aprovados</span>
                    </div>
                    <div class="div2 pendentes">
                        <span id="numPendentes" class="numero1">0</span>
                        <span class="label">Pendentes</span>
                    </div>
                    <div class="div2 reprovados">
                        <span id="numReprovados" class="numero1">0</span>
                        <span class="label">Reprovados</span>
                    </div>
                </div>
            </div>

            <!-- Gráficos -->
            <div class="graficos-wrapper">
                <div class="grafico">
                    <canvas id="meuGrafico"></canvas>
                </div>
                <div class="grafico1">
                    <canvas id="meuGrafico2"></canvas>
                </div>
            </div>

            <!-- Botões fixos -->
            <div class="container2">
                <button class="div1" onclick="window.location.href='cursos.html'">
                    <img src="../assets/img/Add.png" alt="Adicionar">
                    <h5 class="hh5">Cadastrar Cursos</h5>
                </button>
                <button class="div2" onclick="window.location.href='coordenadores.html'">
                    <img src="../assets/img/People.png" alt="Pessoas">
                    <h5 class="hh5">Cadastrar Coordenadores</h5>
                </button>
                <button class="div3" onclick="window.location.href='configuracoes.html'">
                    <img src="../assets/img/Gear.png" alt="Configurações">
                    <h5 class="hh5">Configurações e regras</h5>
                </button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
