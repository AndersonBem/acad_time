<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <meta name="description" content="Sistema AcadTime para gerenciamento de atividades complementares, submissões e auditorias de cursos.">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/redefinirsenha.css">
</head>

<body>

<section class="login-page">

    <div class="login-brand">
        <img src="../assets/img/logo.png" alt="Logo AcadTime" class="logo">
        <h1>Crie uma nova senha</h1>
        <p>Escolha uma senha segura para voltar a acessar o AcadTime.</p>
    </div>

    <div class="login-card">
        <div class="login-box">
            <h2>Redefinir Senha</h2>
            <p class="login-subtitle">Digite e confirme sua nova senha</p>

            <form id="redefinirForm">

                <div class="input-group">
                    <label for="novaSenha">Nova senha</label>
                    <input type="password" id="novaSenha" placeholder="Digite a nova senha" required>
                    <small class="erro" id="erroSenha"></small>
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">Confirmar nova senha</label>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required>
                    <small class="erro" id="erroConfirmar"></small>
                </div>

                <button type="submit" class="btn-primary">
                    Salvar nova senha
                </button>

                <button type="button" class="btn-secondary" onclick="window.location.href='login.html'">
                    ← Voltar para login
                </button>

            </form>
        </div>
    </div>

</section>

<script src="../js/config.js"></script>
<script src="../js/redefinirsenha.js"></script>

</body>
</html>
