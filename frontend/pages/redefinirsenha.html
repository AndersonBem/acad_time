<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/redefinirsenha.css">
</head>

<body>

    <div class="redefinir-container">

      
        <img src="../assets/img/logo.png" alt="Logo AcadTime" class="logo">

       
        <section class="redefinir-container">

            <div class="form-side">
                <div class="login-box">

                    <h2>Redefinir Senha</h2>

                    <form id="redefinirForm">

                        <div class="input-group">
                            <label for="novaSenha">Nova senha</label>
                            <input type="password" id="novaSenha" placeholder="Digite a nova senha" required>
                         <small class="erro" id="erroSenha"></small>
                             
                        </div>
                        <small class="erro" id="erroSenha"></small>
                        <div class="input-group">
                            <label for="confirmarSenha">Confirmar nova senha</label>
                            <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required>
                             <small class="erro" id="erroConfirmar"></small>
                        </div>

                        <button type="submit" class="button1">Salvar</button>

                    </form>
                    
                </div>
            </div>
        
        </section>
        
    </div>
      
   
    <script src="../js/config.js"></script>
    <script src="../js/redefinirsenha.js"></script>

</body>
</html>
